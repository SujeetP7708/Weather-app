<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="https://openweathermap.org/img/wn/01d.png">
</head>

<body class=" min-h-screen flex flex-col bg-[#ececec] items-center justify-center px-4 py-4 md:py-[20px]">
<h1 class=" text-4xl font-extrabold mb-8 " >Weather Website</h1>
<!-- MAIN GRID -->
<div class=" w-full max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
   
  <!-- LEFT SIDE -->
  <div class="flex flex-col gap-4">

    
    <div class="flex gap-2 relative">
      <input 
        type="text" 
        id="getcity"
        placeholder="Enter city..."
        class="flex-1 h-14 px-4 py-1  rounded-xl text-black outline-none shadow" list="browsers"
      >
      <button id="searchbtn"
        class="bg-white text-blue-600 px-4 py-3 rounded-xl font-semibold hover:bg-gray-200 ">
        Search
      </button>
      <button id="tempToggle" class="mt-2 px-3 py-1 bg-gray-200 rounded-lg text-sm font-semibold"> °F </button>
      <!-- Recent Search Dropdown -->
      <datalist id="browsers"></datalist>
    </div>

   
    <h6 id="fetchmessage" class="hidden bg-red-500 text-white text-center py-2 rounded-lg"></h6>

    
    <button id="currentloc"
      class="bg-indigo-600 text-white hover:bg-indigo-800 py-3 rounded-xl font-semibold">
      Use Current Location
    </button>

    <!--  DETAILS -->
    <div class="grid grid-cols-2 gap-4 text-center">

      <div class="bg-white p-4 rounded-xl hover:scale-105 transition">
        <p class="text-sm ">Humidity</p>
        <p id="humility" class="font-bold text-lg">--%</p>
      </div>

      <div class="bg-white p-4 rounded-xl hover:scale-105 transition">
        <p class="text-sm ">Wind</p>
        <p id="wind" class="font-bold text-lg">-- km/h</p>
      </div>

      <div class="bg-white p-4 rounded-xl hover:scale-105 transition">
        <p class="text-sm ">Pressure</p>
        <p id="pressure" class="font-bold text-lg">-- hPa</p>
      </div>

      <div class="bg-white p-4 rounded-xl hover:scale-105 transition">
        <p class="text-sm ">Feels Like</p>
        <p id="feel" class="font-bold text-lg">--°C</p>
      </div>

    </div>

  </div>

  <!-- RIGHT SIDE  -->
  <div class="bg-white rounded-2xl p-6 flex  justify-center items-center md:items-center">

    <div class="flex flex-col justify-center items-center flex-1">
      <h2 id="citydisplay" class="text-full md:text-3xl font-semibold text-center md:text-left">
        City
      </h2>
      <p id="citydeg" class="text-5xl font-bold my-3 text-center md:text-left">
        --°C
      </p>
      <p id="condition" class="text-lg opacity-90 text-center md:text-left">
        ---
      </p>
    </div>
    <div class="mt-4">
      <img id="imgwather" class="w-48 h-48 mx-auto md:mx-0">
    </div>

  </div>

 


</div>

<div class="w-full max-w-6xl mx-auto">

  <h2 class="text-2xl font-bold mb-4 text-gray-800">
    5-Day Forecast
  </h2>

  <!-- Forecast Container -->
  <div 
    id="forecastContainer"
    class="w-full mx-auto grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4"
  >

    <!-- Example Card (will be dynamic) -->
    <div class="bg-white p-4 rounded-xl shadow text-center hover:scale-105 transition">
      <p class="text-sm text-gray-500">Date</p>
      <img src="" class="mx-auto w-12 h-12" id="forecastIcon">
      <p class="font-bold text-lg" id="forecastTemp">--°C</p>
      <p class="text-sm text-gray-600" id="forecastWind">Wind</p>
      <p class="text-sm text-gray-600" id="forecastHumidity">Humidity</p>
    </div>

  </div>

</div>


 
<script src="./src/script.js"></script>
</body>

</html>
